name: Lua Syntax Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Syntax Check - fivesawUtils.lua
        run: |
          echo "=== Checking fivesawUtils.lua ==="
          luac5.4 -p fivesawUtils.lua && echo "✅ Syntax OK" || echo "❌ Syntax Error"

      - name: Line Count
        run: |
          echo "=== Stats ==="
          wc -l fivesawUtils.lua
          ls -lh fivesawUtils.lua
